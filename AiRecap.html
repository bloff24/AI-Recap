    const fetchWithRetry = async (url, options, retries = 5) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < retries; i++) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            throw new Error(errData.error?.message || `HTTP error! status: ${res.status}`);
          }
          return res;
        } catch (err) {
          if (i === retries - 1) throw err;
          await new Promise(resolve => setTimeout(resolve, delays[i]));
        }
      }
    };

      });

      if(!img) return def;

            if(br > 20 && br < 240){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; cnt++; }
          }

        if(cnt > 0) return {
          c1: `rgba(${Math.floor((r/cnt)*0.2)}, ${Math.floor((g/cnt)*0.2)}, ${Math.floor((b/cnt)*0.2)}, 1)`,
          c2: `rgba(${Math.floor((r/cnt)*0.6)}, ${Math.floor((g/cnt)*0.6)}, ${Math.floor((b/cnt)*0.6)}, 1)`

      const createWavBase64 = (b64, sRate=24000) => { 
        const bs = window.atob(b64); const len = bs.length; const bytes = new Uint8Array(len); 
        for(let i=0; i<len; i++) bytes[i] = bs.charCodeAt(i); 
        const buf = bytes.buffer; const wBuf = new ArrayBuffer(44 + buf.byteLength); const view = new DataView(wBuf); 
        const wStr = (v, o, s) => { for(let i=0; i<s.length; i++) v.setUint8(o+i, s.charCodeAt(i)); }; 
        wStr(view, 0, 'RIFF'); view.setUint32(4, 36 + buf.byteLength, true); wStr(view, 8, 'WAVE'); wStr(view, 12, 'fmt '); 
        view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sRate, true); 
        view.setUint32(28, sRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); wStr(view, 36, 'data'); 
        view.setUint32(40, buf.byteLength, true); new Uint8Array(wBuf, 44).set(new Uint8Array(buf)); 
        let bin = ''; const wb = new Uint8Array(wBuf); 
        for(let i=0; i<wb.length; i+=8192) bin += String.fromCharCode.apply(null, wb.subarray(i, Math.min(i+8192, wb.length))); 
        return 'data:audio/wav;base64,' + window.btoa(bin); 
      };

                      </h3>
                      <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">Editing history record</p>
                    </div>
                    <button onClick={() => setEditingHistoryItem(null)} className="text-slate-400 hover:text-red-500 transition-colors p-2 bg-slate-100 rounded-full">
                      <Icon name="ph-x" size={24} />
                    </button>
                  </div>
                  <textarea 
                    className={`${C_INP} flex-1 font-serif text-lg sm:text-xl leading-relaxed resize-none shadow-inner p-6 custom-scrollbar`}
                    value={historyEditText}
                    onChange={e => setHistoryEditText(e.target.value)}
                  />
                  <div className="mt-8 flex flex-col sm:flex-row gap-4">
                    <button onClick={saveHistoryEdit} disabled={isProcessing} className="flex-1 bg-sky-500 text-white font-black py-5 rounded-xl shadow-md hover:bg-sky-600 transition-all uppercase tracking-widest text-sm flex items-center justify-center gap-2 disabled:opacity-50">
                      {isProcessing ? <Icon name="ph-spinner" spin size={20}/> : <Icon name="ph-floppy-disk" size={20}/>}
                      Save Changes to History
                    </button>
                    <button onClick={() => setEditingHistoryItem(null)} className="sm:w-48 bg-slate-100 text-slate-600 font-black py-5 rounded-xl shadow-sm hover:bg-slate-200 transition-all uppercase tracking-widest text-sm">Cancel</button>
                  </div>
                </div>
              </div>
            )}

            {/* Floating Headshot Cropper Modal */}
            {showHsCropper && (
              <div className="fixed inset-0 z-[110] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6">
                <div className="bg-white p-6 sm:p-10 rounded-[2.5rem] w-full max-w-lg shadow-2xl flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-xl font-black text-slate-800 uppercase tracking-widest flex items-center gap-3"><Icon name="ph-crop" size={28} className="text-sky-500" /> Crop Headshot</h3>
                    <button onClick={() => setShowHsCropper(false)} className="text-slate-400 hover:text-red-500 transition-colors p-2 bg-slate-100 rounded-full"><Icon name="ph-x" size={20} /></button>
                  </div>
                  <div className="relative w-full h-[400px] bg-slate-100 rounded-xl overflow-hidden cursor-move border-2 border-slate-200 flex items-center justify-center" onPointerDown={onHsPointerDown} onPointerMove={onHsPointerMove} onPointerUp={onHsPointerUp} onPointerLeave={onHsPointerUp}>
                    <img src={hsRawImage} ref={hsImageRef} className="absolute pointer-events-none max-w-none" style={{ transform: `translate(calc(-50% + ${hsOffset.x}px), calc(-50% + ${hsOffset.y}px)) scale(${imgNaturalSize.w ? Math.max(240/imgNaturalSize.w, 300/imgNaturalSize.h) * hsZoom : hsZoom})`, left: '50%', top: '50%', transformOrigin: 'center' }} />
                    <div className="absolute inset-0 pointer-events-none" style={{ boxShadow: '0 0 0 9999px rgba(0, 0, 0, 0.5)' }}>
                      <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[240px] h-[300px] border-2 border-sky-400 rounded-lg shadow-[0_0_0_9999px_rgba(15,23,42,0.75)]"></div>
                    </div>
                  </div>
                  <div className="mt-6 flex gap-4 items-center">
                    <Icon name="ph-magnifying-glass-minus" size={20} className="text-slate-400 shrink-0" />
                    <input type="range" min="0.1" max="3" step="0.05" value={hsZoom} onChange={e=>setHsZoom(parseFloat(e.target.value))} className="flex-1" />
                    <Icon name="ph-magnifying-glass-plus" size={20} className="text-slate-400 shrink-0" />
                  </div>
                  <div className="flex flex-col sm:flex-row gap-4 mt-8">
                    <button onClick={handleSaveCrop} className="flex-1 bg-sky-500 text-white font-black py-4 rounded-xl shadow-md hover:bg-sky-600 transition-all uppercase tracking-widest text-sm flex items-center justify-center gap-2"><Icon name="ph-check" size={20}/> Apply Crop</button>
                  </div>
                </div>
              </div>
            )}

            {/* Floating Action Photo Cropper Modal */}
            {showActionCropper && (
              <div className="fixed inset-0 z-[110] bg-slate-900/90 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6">
                <div className="bg-white p-6 sm:p-10 rounded-[2.5rem] w-full max-w-2xl shadow-2xl flex flex-col">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="text-xl font-black text-slate-800 uppercase tracking-widest flex items-center gap-3"><Icon name="ph-crop" size={28} className="text-sky-500" /> Crop Action Background</h3>
                    <button onClick={() => setShowActionCropper(false)} className="text-slate-400 hover:text-red-500 transition-colors p-2 bg-slate-100 rounded-full"><Icon name="ph-x" size={20} /></button>
                  </div>
                  <div className="relative w-full h-[400px] bg-slate-100 rounded-xl overflow-hidden cursor-move border-2 border-slate-200 flex items-center justify-center" onPointerDown={onActionPointerDown} onPointerMove={onActionPointerMove} onPointerUp={onActionPointerUp} onPointerLeave={onActionPointerUp}>
                    <img src={actionRawImage} ref={actionImageRef} className="absolute pointer-events-none max-w-none" style={{ transform: `translate(calc(-50% + ${actionOffset.x}px), calc(-50% + ${actionOffset.y}px)) scale(${actionNaturalSize.w ? Math.max(480/actionNaturalSize.w, 270/actionNaturalSize.h) * actionZoom : actionZoom})`, left: '50%', top: '50%', transformOrigin: 'center' }} />
                    <div className="absolute inset-0 pointer-events-none" style={{ boxShadow: '0 0 0 9999px rgba(0, 0, 0, 0.5)' }}>
                      <div className="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[480px] h-[270px] border-2 border-sky-400 rounded-lg shadow-[0_0_0_9999px_rgba(15,23,42,0.75)]"></div>
                    </div>
                  </div>
                  <div className="mt-6 flex gap-4 items-center">
                    <Icon name="ph-magnifying-glass-minus" size={20} className="text-slate-400 shrink-0" />
                    <input type="range" min="0.1" max="3" step="0.05" value={actionZoom} onChange={e=>setActionZoom(parseFloat(e.target.value))} className="flex-1" />
                    <Icon name="ph-magnifying-glass-plus" size={20} className="text-slate-400 shrink-0" />
                  </div>
                  <div className="flex flex-col sm:flex-row gap-4 mt-8">
                    <button onClick={handleSaveActionCrop} className="flex-1 bg-sky-500 text-white font-black py-4 rounded-xl shadow-md hover:bg-sky-600 transition-all uppercase tracking-widest text-sm flex items-center justify-center gap-2"><Icon name="ph-check" size={20}/> Apply Crop</button>
                  </div>
                </div>
              </div>
            )}

          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
